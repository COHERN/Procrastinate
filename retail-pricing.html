<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Procrastinator Prints — Retail Pricing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #fcfcfc;
      --text:   #111;
      --muted:  #666;
      --red:    #c1121f;
      --green:  #2e7d32;
      --border: #ddd;
      --panel:  #fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Mono", monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      background-image: radial-gradient(rgba(0,0,0,0.012) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    header {
      text-align: center;
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    h1 { margin: 0; font-size: 18px; letter-spacing: 0.1em; }
    h1 span { font-size: 12px; color: var(--muted); display: block; margin-top: 4px; letter-spacing: 0.15em; }

    main {
      max-width: 900px;
      margin: auto;
      padding: 18px 20px 60px;
    }

    /* ── COLLAPSIBLE SECTIONS ── */
    .section {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }

    .section-header:hover { background: rgba(0,0,0,0.02); }

    .section-title {
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
    }

    .section-toggle {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      transition: transform 0.2s;
    }

    .section.collapsed .section-toggle { transform: rotate(-90deg); }
    .section.collapsed .section-body   { display: none; }

    .section-body { padding: 16px; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
    }

    label {
      font-size: 12.5px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    input, select, textarea {
      padding: 10px;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── BUTTONS ── */
    button {
      padding: 10px 16px;
      font-family: inherit;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      letter-spacing: 0.06em;
      font-size: 13px;
    }

    button:hover { border-color: var(--red); }

    .btn-add {
      border-color: var(--red);
      color: var(--red);
      font-weight: 700;
      margin-top: 12px;
      width: 100%;
    }

    /* ── DESIGN CARDS ── */
    .design-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      background: var(--bg);
    }

    .design-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .design-card-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .btn-remove {
      font-size: 11px;
      color: var(--muted);
      padding: 4px 10px;
    }

    .btn-remove:hover { color: var(--red); border-color: var(--red); }

    /* ── RESULTS ── */
    .results {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .result-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
      font-size: 12.5px;
      margin-bottom: 5px;
    }

    .rl { color: var(--muted); }
    .rv { font-weight: 700; }

    .true-cost {
      font-size: 14px;
      font-weight: 700;
      color: var(--red);
      margin: 10px 0 8px;
    }

    .retail-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .retail-option {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
      background: var(--panel);
    }

    .retail-option .pct   { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; }
    .retail-option .price { font-size: 18px; font-weight: 700; margin-top: 3px; }
    .retail-option .prof  { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .retail-option.recommended { border-color: var(--green); }
    .retail-option.recommended .price { color: var(--green); }

    /* ── ORDER SUMMARY ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      text-align: center;
      background: var(--bg);
    }

    .summary-card .slabel { font-size: 9px; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
    .summary-card .svalue { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .summary-card.ok   { border-color: var(--green); }
    .summary-card.ok   .svalue { color: var(--green); }
    .summary-card.warn { border-color: var(--red); }
    .summary-card.warn .svalue { color: var(--red); }

    .threshold-bar {
      height: 6px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .threshold-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--red);
      transition: width 0.3s ease, background 0.3s ease;
    }

    .threshold-fill.full { background: var(--green); }
    .threshold-note { font-size: 11px; color: var(--muted); }

    /* ── OVERHEAD NOTE ── */
    #overheadNote {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.5;
    }

    /* ── BOTTOM BAR ── */
    .printBar {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .printHint { font-size: 12px; color: var(--muted); flex: 1; line-height: 1.45; }

    /* ── DARK MODE ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:     #111;
        --text:   #f0f0f0;
        --muted:  #999;
        --border: #333;
        --panel:  #1e1e1e;
      }
      input, select, textarea { background: #1e1e1e; color: #f0f0f0; border-color: #333; }
    }
  </style>
</head>
<body>

<header>
  <h1>PROCRASTINATOR PRINTS! <span>RETAIL PRICING TOOL</span></h1>
  <nav style="margin-top:8px; font-size:11px; letter-spacing:0.15em;">
    <a href="index.html" style="color:var(--red); text-decoration:none; margin-right:16px;">← QUOTE TOOL</a>
    <a href="retail-pricing.html" style="color:var(--text); text-decoration:none;">RETAIL PRICING</a>
  </nav>
</header>

<main>

  <!-- 1. DESIGNS -->
  <div class="section" id="sectionDesigns">
    <div class="section-header" data-target="sectionDesigns">
      <span class="section-title">DESIGNS</span>
      <span class="section-toggle">▼</span>
    </div>
    <div class="section-body">
      <div class="designs-list" id="designsList"></div>
      <button class="btn-add" id="addDesignBtn" type="button">+ ADD DESIGN</button>
    </div>
  </div>

  <!-- 2. OVERHEAD SETTINGS -->
  <div class="section" id="sectionOverhead">
    <div class="section-header" data-target="sectionOverhead">
      <span class="section-title">OVERHEAD SETTINGS</span>
      <span class="section-toggle">▼</span>
    </div>
    <div class="section-body">
      <div class="grid">
        <label>BIG CARTEL / PLATFORM ($/mo)
          <input id="ohPlatform" type="number" min="0" step="0.01" value="9.99">
        </label>
        <label>DOMAIN ($/mo)
          <input id="ohDomain" type="number" min="0" step="0.01" value="1.50">
        </label>
        <label>PACKAGING MATERIALS ($/mo)
          <input id="ohPackaging" type="number" min="0" step="0.01" value="15.00">
        </label>
        <label>OTHER MONTHLY COSTS
          <input id="ohOther" type="number" min="0" step="0.01" value="0">
        </label>
        <label>EST. SHIRTS SOLD / MONTH
          <input id="ohUnits" type="number" min="1" value="20">
        </label>
        <label>BUFFER %
          <select id="ohBuffer">
            <option value="0.05">5%</option>
            <option value="0.08" selected>8%</option>
            <option value="0.10">10%</option>
            <option value="0.15">15%</option>
          </select>
        </label>
      </div>
      <div id="overheadNote">—</div>
    </div>
  </div>

  <!-- 3. ORDER SUMMARY -->
  <div class="section" id="sectionSummary">
    <div class="section-header" data-target="sectionSummary">
      <span class="section-title">ORDER SUMMARY</span>
      <span class="section-toggle">▼</span>
    </div>
    <div class="section-body">
      <div class="summary-grid">
        <div class="summary-card" id="cardTotal">
          <div class="slabel">Blank Order Total</div>
          <div class="svalue" id="summaryOrderTotal">$0.00</div>
        </div>
        <div class="summary-card" id="cardShipping">
          <div class="slabel">Shipping</div>
          <div class="svalue" id="summaryShipping">—</div>
        </div>
        <div class="summary-card">
          <div class="slabel">Total Shirts</div>
          <div class="svalue" id="summaryShirts">0</div>
        </div>
        <div class="summary-card">
          <div class="slabel">Designs</div>
          <div class="svalue" id="summaryDesigns">0</div>
        </div>
      </div>
      <div class="threshold-bar">
        <div class="threshold-fill" id="thresholdFill" style="width:0%"></div>
      </div>
      <div class="threshold-note" id="thresholdNote">Add designs to reach the $200 free shipping threshold.</div>
    </div>
  </div>

  <div class="printBar">
    <button id="calcBtn" type="button" style="border-color:var(--red);color:var(--red);font-weight:700;">UPDATE</button>
    <div class="printHint">Prices update as you type. Hit UPDATE to force recalculate.</div>
  </div>

</main>

<script>
const COSTS = { ink:0.08, labor:1.25, setup:35.00, screenPrep:4.00, spoilage:10.00 };
const FREE_SHIP = 200.00;
let designs = [];
let nextId  = 1;

const $     = (id) => document.getElementById(id);
const money = (n)  => `$${(Number(n)||0).toFixed(2)}`;

function calcOverhead() {
  const monthly =
    (Number($("ohPlatform").value)  || 0) +
    (Number($("ohDomain").value)    || 0) +
    (Number($("ohPackaging").value) || 0) +
    (Number($("ohOther").value)     || 0);
  const units  = Math.max(1, Number($("ohUnits").value) || 1);
  const buffer = Number($("ohBuffer").value) || 0.08;
  return { perShirt: monthly / units, monthly, buffer };
}

function calcPrint(qty, colors, locs) {
  return (COSTS.ink * colors * locs * qty) + (COSTS.labor * qty) +
    COSTS.setup + (COSTS.screenPrep * colors * locs) + COSTS.spoilage;
}

function buildCard(d) {
  const div = document.createElement("div");
  div.className = "design-card";
  div.id = `design-${d.id}`;
  div.innerHTML = `
    <div class="design-card-header">
      <div class="design-card-title">DESIGN #${d.id}</div>
      <button class="btn-remove" type="button" data-id="${d.id}">REMOVE</button>
    </div>
    <div class="grid">
      <label>DESIGN NAME
        <input type="text" class="d-name" placeholder="e.g. CHICKEN CHAMPIONS" value="${d.name}">
      </label>
      <label>GARMENT
        <input type="text" class="d-garment" placeholder="e.g. GILDAN 5000" value="${d.garment}">
      </label>
      <label>GARMENT COLOR
        <input type="text" class="d-color" placeholder="e.g. RED" value="${d.color}">
      </label>
      <label>BLANK COST ($/shirt)
        <input type="number" class="d-blank" min="0" step="0.01" value="${d.blank}">
      </label>
      <label>QTY
        <input type="number" class="d-qty" min="1" value="${d.qty}">
      </label>
      <label>COLORS (1–4)
        <select class="d-colors">
          <option value="1" ${d.colors==1?'selected':''}>1</option>
          <option value="2" ${d.colors==2?'selected':''}>2</option>
          <option value="3" ${d.colors==3?'selected':''}>3</option>
          <option value="4" ${d.colors==4?'selected':''}>4</option>
        </select>
      </label>
      <label>PRINT LOCATION
        <select class="d-locs">
          <option value="1" ${d.locs==1?'selected':''}>1 LOCATION</option>
          <option value="2" ${d.locs==2?'selected':''}>2 LOCATIONS</option>
        </select>
      </label>
      <label>ARTWORK FEE ($)
        <input type="number" class="d-art" min="0" step="0.01" value="${d.art}" placeholder="0.00">
      </label>
    </div>
    <div class="results" id="results-${d.id}"></div>
  `;

  div.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input",  calc);
    el.addEventListener("change", calc);
  });

  div.querySelector(".btn-remove").addEventListener("click", () => {
    designs = designs.filter(x => x.id !== d.id);
    div.remove();
    calc();
  });

  return div;
}

function readCard(id) {
  const div = $(`design-${id}`);
  if (!div) return null;
  return {
    id,
    blank:  Number(div.querySelector(".d-blank").value)  || 0,
    qty:    Math.max(1, Number(div.querySelector(".d-qty").value) || 1),
    colors: Number(div.querySelector(".d-colors").value) || 1,
    locs:   Number(div.querySelector(".d-locs").value)   || 1,
    art:    Number(div.querySelector(".d-art").value)    || 0,
  };
}

function calc() {
  const oh = calcOverhead();

  $("overheadNote").textContent =
    `Monthly overhead: ${money(oh.monthly)} ÷ ${$("ohUnits").value} shirts = ${money(oh.perShirt)}/shirt + ${Math.round(oh.buffer*100)}% buffer`;

  let totalBlanks = 0, totalShirts = 0, totalDesigns = 0;

  designs.forEach(d => {
    const data = readCard(d.id);
    if (!data) return;

    const blankTotal   = data.blank * data.qty;
    const printCost    = calcPrint(data.qty, data.colors, data.locs);
    const artPerShirt  = data.art / data.qty;
    const baseCost     = (blankTotal + printCost) / data.qty + artPerShirt + oh.perShirt;
    const trueCost     = baseCost * (1 + oh.buffer);

    const r50 = trueCost / 0.50;
    const r55 = trueCost / 0.45;
    const r60 = trueCost / 0.40;

    totalBlanks  += blankTotal;
    totalShirts  += data.qty;
    totalDesigns += 1;

    const el = $(`results-${d.id}`);
    if (el) {
      el.innerHTML = `
        <div class="result-row"><span class="rl">BLANK COST:</span><span class="rv">${money(blankTotal)} (${money(data.blank)}/shirt)</span></div>
        <div class="result-row"><span class="rl">PRINT COST:</span><span class="rv">${money(printCost)} (${money(printCost/data.qty)}/shirt)</span></div>
        <div class="result-row"><span class="rl">ARTWORK/SHIRT:</span><span class="rv">${money(artPerShirt)}</span></div>
        <div class="result-row"><span class="rl">OVERHEAD/SHIRT:</span><span class="rv">${money(oh.perShirt)}</span></div>
        <div class="result-row"><span class="rl">BUFFER:</span><span class="rv">${money(baseCost * oh.buffer)}/shirt</span></div>
        <div class="true-cost">TRUE COST/SHIRT: ${money(trueCost)}</div>
        <div class="retail-options">
          <div class="retail-option">
            <div class="pct">50% MARGIN</div>
            <div class="price">${money(r50)}</div>
            <div class="prof">+${money((r50-trueCost)*data.qty)} profit</div>
          </div>
          <div class="retail-option recommended">
            <div class="pct">55% MARGIN ★</div>
            <div class="price">${money(r55)}</div>
            <div class="prof">+${money((r55-trueCost)*data.qty)} profit</div>
          </div>
          <div class="retail-option">
            <div class="pct">60% MARGIN</div>
            <div class="price">${money(r60)}</div>
            <div class="prof">+${money((r60-trueCost)*data.qty)} profit</div>
          </div>
        </div>
      `;
    }
  });

  // Order summary
  $("summaryOrderTotal").textContent = money(totalBlanks);
  $("summaryShirts").textContent     = String(totalShirts);
  $("summaryDesigns").textContent    = String(totalDesigns);

  const pctFilled = Math.min(100, (totalBlanks / FREE_SHIP) * 100);
  $("thresholdFill").style.width = `${pctFilled}%`;
  $("thresholdFill").classList.toggle("full", totalBlanks >= FREE_SHIP);

  const cardShipping = $("cardShipping");
  const cardTotal    = $("cardTotal");

  if (totalDesigns === 0) {
    $("summaryShipping").textContent = "—";
    $("thresholdNote").textContent   = "Add designs to reach the $200 free shipping threshold.";
    cardShipping.className = "summary-card";
    cardTotal.className    = "summary-card";
  } else if (totalBlanks >= FREE_SHIP) {
    $("summaryShipping").textContent = "FREE ✓";
    $("thresholdNote").textContent   = `${money(totalBlanks)} ordered — free shipping unlocked!`;
    cardShipping.className = "summary-card ok";
    cardTotal.className    = "summary-card ok";
  } else {
    const rem = FREE_SHIP - totalBlanks;
    $("summaryShipping").textContent = "TBD";
    $("thresholdNote").textContent   = `Add ${money(rem)} more in blanks to unlock free shipping.`;
    cardShipping.className = "summary-card warn";
    cardTotal.className    = "summary-card warn";
  }
}

function addDesign() {
  const d = { id: nextId++, name:"", garment:"GILDAN 5000", color:"RED", blank:2.50, qty:24, colors:1, locs:1, art:0 };
  designs.push(d);
  $("designsList").appendChild(buildCard(d));
  calc();
}

// ── Collapsible sections ───────────────────────────────────────────────────
document.querySelectorAll(".section-header").forEach(header => {
  header.addEventListener("click", () => {
    const target = header.dataset.target;
    const section = $(target);
    section.classList.toggle("collapsed");
  });
});

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input",  calc);
    el.addEventListener("change", calc);
  });
  $("addDesignBtn").addEventListener("click", addDesign);
  $("calcBtn").addEventListener("click", calc);
  addDesign();
  calc();
});
</script>
</body>
</html>
